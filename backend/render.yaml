services:
  - type: web
    name: adaptive-study-planner-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: "pip install -r backend/requirements.txt && alembic/alembic upgrade head"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: YOUTUBE_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
